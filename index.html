<!DOCTYPE html>
<html>
<head>
    <title>My World Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* This makes the map fill the whole screen */
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. Initialize the map and set the starting view (lat, lng, zoom)
        var map = L.map('map').setView([20, 0], 2);

        // 2. Add the map tiles (the actual map image)
        // We use OpenStreetMap tiles which are free
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. Adding some example country labels (Markers)
        // Format: L.marker([Latitude, Longitude]).addTo(map).bindPopup("Label Name");
        
        L.marker([37.0902, -95.7129]).addTo(map).bindPopup("<b>USA</b>");.openPopup()
        L.marker([55.3781, -3.4360]).addTo(map).bindPopup("<b>United Kingdom</b>");.openPopup()
        L.marker([-25.2744, 133.7751]).addTo(map).bindPopup("<b>Australia</b>");.openPopup()
        L.marker([35.8617, 104.1954]).addTo(map).bindPopup("<b>China</b>");.openPopup()
        L.marker([-14.2350, -51.9253]).addTo(map).bindPopup("<b>Brazil</b>");.openPopup()
        L.marker([20.5937, 78.9629]).addTo(map).bindPopup("<b>India</b>");.openPopup()

        // Tip: You can add as many as you like!
    </script>
</body>
</html>
